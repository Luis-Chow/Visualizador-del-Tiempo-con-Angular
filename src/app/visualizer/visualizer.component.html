<div class="visualizer-container">
  <header class="top-bar">
    <h1>Visualizador del Tiempo</h1>
    <button (click)="logout()" class="logout-btn">Cerrar Sesión</button>
  </header>

  <div class="controls">
    <div class="control-group">
      <label for="clockSelect">Seleccionar visualización:</label>
      <select id="clockSelect" (change)="onClockChange($event)">
        <option *ngFor="let clock of clocks" [value]="clock.id">
          {{ clock.name }}
        </option>
      </select>
    </div>

    <div class="control-group">
      <label for="timeSlider">Alterar tiempo (minutos):</label>
      <input 
        id="timeSlider" 
        type="range" 
        min="-720" 
        max="720" 
        value="0" 
        (input)="onSliderChange($event)"
      >
      <span class="time-preview">{{ (timeService.time$ | async) | date:'HH:mm:ss' }}</span>
    </div>
  </div>

  <main class="clock-display-area">
    <div [ngSwitch]="selectedClock" style="width: 100%; display: flex; justify-content: center;">
      
      <app-analog-clock *ngSwitchCase="'analogico'"></app-analog-clock>
      <app-digital-clock *ngSwitchCase="'digital'"></app-digital-clock>
      <app-binary-clock *ngSwitchCase="'binario'"></app-binary-clock>
      <app-progress-clock *ngSwitchCase="'barras'" style="width: 100%;"></app-progress-clock>
      <app-hex-clock *ngSwitchCase="'hexadecimal'" style="width: 100%;"></app-hex-clock>
      
    </div>
  </main>
</div>
