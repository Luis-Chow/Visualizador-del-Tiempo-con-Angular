<div class="visualizer-container">
  <header class="top-bar">
    <h1>Visualizador del Tiempo</h1>
    <button (click)="logout()" class="logout-btn">Cerrar Sesión</button>
  </header>

  <div class="controls">
    <div class="control-group">
      <label for="clockSelect">Seleccionar visualización:</label>
      <select id="clockSelect" (change)="onClockChange($event)">
        <option *ngFor="let clock of clocks" [value]="clock.id">
          {{ clock.name }}
        </option>
      </select>
    </div>

    <div class="control-group">
      <label for="timeSlider">Alterar tiempo (minutos):</label>
      <input 
        id="timeSlider" 
        type="range" 
        min="-720" 
        max="720" 
        value="0" 
        (input)="onSliderChange($event)"
      >
      <span class="time-preview">{{ (timeService.time$ | async) | date:'HH:mm:ss' }}</span>
    </div>
  </div>

  <main class="clock-display-area">
    <div class="placeholder">
      <h2>Reloj seleccionado: {{ selectedClock }}</h2>
      <p></p>
    </div>
  </main>
</div>
